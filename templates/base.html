<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LeadForge AI</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <!-- ✅ FAVICON FIX -->
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">

    <meta name="description" content="LeadForge AI SaaS Lead Engine">
</head>

<body>

<div class="navbar">
    <div class="nav-flex">

        <div class="nav-left">
            <span class="logo">LeadForge<span style="color:#2563eb;">AI</span></span>

            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('admin') }}">Dashboard</a>
            <a href="{{ url_for('upgrade') }}">Upgrade</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>

    </div>
</div>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash-container">
        {% for message in messages %}
            <div class="flash">{{ message }}</div>
        {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
