<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LeadForge AI | Secure Login</title>

    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background: #0b1220;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #111827;
            border-radius: 16px;
            padding: 32px;
            border: 1px solid #1f2937;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            font-size: 22px;
            color: #3b82f6;
            margin: 0;
        }

        .brand p {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 6px;
        }

        label {
            font-size: 13px;
            margin-bottom: 6px;
            display: block;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid #374151;
            background: #0f172a;
            color: #e5e7eb;
            outline: none;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #3b82f6;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .error {
            background: #7f1d1d;
            color: #fecaca;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 3px solid #ef4444;
        }

        .error i {
            margin-right: 8px;
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #1f2937;
        }

        .back-link {
            display: inline-block;
            margin-top: 12px;
            color: #3b82f6;
            text-decoration: none;
            font-size: 12px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Flash message styles */
        .flash-messages {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .flash {
            padding: 12px 20px;
            margin-bottom: 10px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }

        .flash.error {
            background: #7f1d1d;
            color: #fca5a5;
            border-left: 4px solid #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<!-- Flash Messages -->
{% if session.flashes %}
<div class="flash-messages">
    {% for flash in session.flashes %}
    <div class="flash {{ flash.category }}">
        <i class="fa-solid {% if flash.category == 'error' %}fa-exclamation-circle{% else %}fa-info-circle{% endif %}"></i>
        {{ flash.message }}
    </div>
    {% endfor %}
    {% set _ = session.pop('flashes', None) %}
</div>
{% endif %}

<div class="login-card">

    <div class="brand">
        <h1><i class="fa-solid fa-bolt"></i> LeadForge AI</h1>
        <p>Secure Admin Access</p>
    </div>

    {% if error %}
        <div class="error">
            <i class="fa-solid fa-triangle-exclamation"></i>
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('login_submit') }}">

        <label>Username</label>
        <input type="text" name="username" required autofocus>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">
            <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>

    </form>

    <div class="note">
        Admin login only
        <br>
        <a href="{{ url_for('home') }}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </div>

</div>

<script>
    // Auto-hide flash messages after 5 seconds
    setTimeout(() => {
        const flashes = document.querySelectorAll('.flash');
        flashes.forEach(flash => {
            flash.style.animation = 'slideOut 0.3s ease forwards';
            setTimeout(() => flash.remove(), 300);
        });
    }, 5000);

    // Add slideOut animation
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    `;
    document.head.appendChild(style);
</script>

</body>
</html>
