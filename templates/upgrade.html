<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to LeadForge Pro</title>

    <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #0b1220 100%);
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .upgrade-container {
            max-width: 480px;
            width: 100%;
            animation: slideUp 0.5s ease;
        }

        .upgrade-card {
            background: #111827;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #1f2937;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .icon-circle i {
            font-size: 44px;
            color: white;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .price {
            font-size: 36px;
            font-weight: 800;
            color: #f59e0b;
            margin: 20px 0;
        }

        .price small {
            font-size: 14px;
            color: #64748b;
            font-weight: normal;
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 24px 0;
            text-align: left;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            padding: 8px;
            background: #0f172a;
            border-radius: 10px;
        }

        .feature-item i {
            color: #22c55e;
            font-size: 14px;
        }

        .paypal-button-container {
            margin: 24px 0;
            min-height: 150px;
        }

        .note {
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1f2937;
        }

        .btn-outline {
            background: transparent;
            color: #3b82f6;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #3b82f6;
            transition: all 0.2s ease;
        }

        .btn-outline:hover {
            background: #3b82f6;
            color: white;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .upgrade-card {
                padding: 24px;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>

    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=BAAv0Ct7cUeb8hoVYp_ix_DRCsXlfExc-4_r8TX6wPXMSPiX517Zz1QbEthEVKOT_GqF3ZN7CNjk8dLP2I&components=buttons&currency=USD"></script>
</head>

<body>

<div class="upgrade-container">
    <div class="upgrade-card">
        <div class="icon-circle">
            <i class="fa-solid fa-crown"></i>
        </div>

        <h1>Upgrade to Pro</h1>
        <div class="subtitle">
            Get full access to AI-powered lead intelligence
        </div>

        <div class="price">
            $9.99 <small>/month</small>
        </div>

        <div class="features-grid">
            <div class="feature-item">
                <i class="fa-solid fa-robot"></i>
                <span>AI Lead Scoring</span>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-chart-line"></i>
                <span>Analytics Dashboard</span>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-infinity"></i>
                <span>Unlimited Leads</span>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-code"></i>
                <span>API Access</span>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-headset"></i>
                <span>Priority Support</span>
            </div>
            <div class="feature-item">
                <i class="fa-solid fa-chart-simple"></i>
                <span>Advanced Reports</span>
            </div>
        </div>

        <div class="paypal-button-container">
            <div id="paypal-button-container"></div>
            <div id="loading-spinner" style="text-align: center; padding: 20px;">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading secure checkout...
            </div>
        </div>

        <div class="note">
            <i class="fa-solid fa-lock"></i> Secure payment via PayPal<br>
            Cancel anytime • No hidden fees
        </div>

        <div style="margin-top: 16px;">
            <a href="{{ url_for('dashboard') }}" class="btn-outline">
                <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

<script>
    // Initialize PayPal button
    if (typeof paypal !== 'undefined' && paypal.Buttons) {
        paypal.Buttons({
            style: {
                layout: 'vertical',
                color: 'gold',
                shape: 'pill',
                label: 'paypal',
                height: 45,
                tagline: false
            },
            
            createOrder: function(data, actions) {
                return actions.order.create({
                    purchase_units: [{
                        reference_id: "PRO_SUBSCRIPTION_" + Date.now(),
                        description: "LeadForge AI Pro - Monthly Subscription",
                        amount: {
                            value: "9.99",
                            currency_code: "USD"
                        },
                        payee: {
                            email_address: "merchant@leadforge.ai"
                        }
                    }],
                    application_context: {
                        brand_name: "LeadForge AI",
                        landing_page: "BILLING",
                        user_action: "PAY_NOW",
                        return_url: window.location.origin + "/payment-success"
                    }
                });
            },

            onApprove: function(data, actions) {
                return actions.order.capture().then(function(details) {
                    // Send confirmation to server
                    return fetch('/api/payment-success', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Requested-With': 'XMLHttpRequest'
                        },
                        body: JSON.stringify({
                            order_id: data.orderID,
                            payer_id: details.payer.payer_id,
                            payer_email: details.payer.email_address,
                            amount: "9.99",
                            status: details.status
                        })
                    }).then(response => response.json())
                      .then(data => {
                          if (data.success) {
                              window.location.href = "{{ url_for('payment_success') }}";
                          } else {
                              alert("Payment processed but verification pending. Our team will contact you.");
                              window.location.href = "{{ url_for('dashboard') }}";
                          }
                      }).catch(() => {
                          window.location.href = "{{ url_for('payment_success') }}";
                      });
                });
            },

            onError: function(err) {
                console.error('PayPal Error:', err);
                document.getElementById('loading-spinner').innerHTML = 
                    '<div style="color: #ef4444; padding: 12px; background: #7f1d1d; border-radius: 8px;">' +
                    '<i class="fa-solid fa-exclamation-triangle"></i> Payment error. Please try again or contact support.' +
                    '</div>';
            },

            onCancel: function(data) {
                console.log('Payment cancelled:', data);
                document.getElementById('loading-spinner').innerHTML = 
                    '<div style="color: #f59e0b; padding: 12px;">' +
                    '<i class="fa-solid fa-info-circle"></i> Payment cancelled. You can try again anytime.' +
                    '</div>';
            }

        }).render('#paypal-button-container');
        
        document.getElementById('loading-spinner').style.display = 'none';
    } else {
        document.getElementById('loading-spinner').innerHTML = 
            '<div style="color: #ef4444; padding: 12px; background: #7f1d1d; border-radius: 8px;">' +
            '<i class="fa-solid fa-exclamation-triangle"></i> Payment system unavailable. Please try again later.' +
            '</div>' +
            '<a href="{{ url_for("dashboard") }}" class="btn-outline" style="margin-top: 16px; display: inline-block;">Continue to Dashboard</a>';
    }
</script>

</body>
</html>
